name: Tauri Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            artifact-name: tauri-build-linux
            artifact-path: |
              src-tauri/target/release/bundle/
              src-tauri/target/release/scs-rclient
          - platform: windows-latest
            artifact-name: tauri-build-windows
            artifact-path: |
              src-tauri/target/release/bundle/
              src-tauri/target/release/scs-rclient.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Standard Tauri App (Linux/Windows)
        run: pnpm tauri build

      - name: Rename Standard Windows Installers (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Rename-Item -NewName { $_.Name -replace "-setup.exe$", "-standard-setup.exe" }
          Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Rename-Item -NewName { $_.Name -replace ".msi$", "-standard.msi" }

      - name: Build Tauri App with Embedded WebView2 (Windows only)
        if: matrix.platform == 'windows-latest'
        run: pnpm tauri build --config '{"bundle": {"windows": {"webviewInstallMode": {"type": "offlineInstaller"}}}}'

      - name: Rename Embedded WebView2 Installers (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike "*-standard-setup.exe" } | Rename-Item -NewName { $_.Name -replace "-setup.exe$", "-webview-inside-setup.exe" }
          Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike "*-standard.msi" } | Rename-Item -NewName { $_.Name -replace ".msi$", "-webview-inside.msi" }

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-build-linux
          path: src-tauri/target/release

      - name: Make binary executable
        run: chmod +x src-tauri/target/release/scs-rclient

      - name: Build Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: scs-rclient.flatpak
          manifest-path: .github/flatpak/online.anthonyis.scs-rclient.yml
          cache-key: flatpak-builder-${{ github.sha }}
          run-tests: false

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-flatpak
          path: scs-rclient.flatpak
          if-no-files-found: error
