name: Tauri Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

env:
  RCLONE_VERSION: 1.74.3
  RCLONE_SIGNING_KEY: FBF737ECE9F8AB18604BD2AC93935E02FF3B54FA

jobs:
  verify-rclone:
    name: Verify Rclone Signatures
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Clone Rclone repository for KEYS
        run: |
          git clone --depth 1 https://github.com/rclone/rclone.git rclone-src

      - name: Import Rclone Release PGP Keys
        run: |
          gpg --import rclone-src/docs/content/KEYS

      - name: Confirm Nick Craig-Wood's Signing Key
        run: |
          # Verify Nick's signing key (fingerprint: ${{ env.RCLONE_SIGNING_KEY }}) is imported
          gpg --list-keys ${{ env.RCLONE_SIGNING_KEY }}

      - name: Download Rclone v${{ env.RCLONE_VERSION }} and Checksums
        run: |
          curl -O -L https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/SHA256SUMS
          curl -O -L https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/rclone-v${{ env.RCLONE_VERSION }}-linux-amd64.zip
          curl -O -L https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/rclone-v${{ env.RCLONE_VERSION }}-windows-amd64.zip
          curl -O -L https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/rclone-v${{ env.RCLONE_VERSION }}-osx-arm64.zip

      - name: Verify Checksums File Signature
        run: |
          gpg --verify SHA256SUMS

      - name: Verify Binary File Hashes
        run: |
          sha256sum -c SHA256SUMS --ignore-missing

      - name: Prepare Verified Binaries
        run: |
          mkdir verified-binaries
          mv rclone-v${{ env.RCLONE_VERSION }}-linux-amd64.zip verified-binaries/
          mv rclone-v${{ env.RCLONE_VERSION }}-windows-amd64.zip verified-binaries/
          mv rclone-v${{ env.RCLONE_VERSION }}-osx-arm64.zip verified-binaries/

      - name: Upload Verified Binaries Artifact
        uses: actions/upload-artifact@v7
        with:
          name: verified-rclone
          path: verified-binaries/
          if-no-files-found: error

  build-linux:
    name: Build Linux Application
    needs: verify-rclone
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        run: |
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get update
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 webkit2gtk-driver xvfb

      - name: Download verified rclone binaries
        uses: actions/download-artifact@v7
        with:
          name: verified-rclone
          path: verified-binaries

      - name: Extract Linux Sidecar
        run: |
          unzip verified-binaries/rclone-v${{ env.RCLONE_VERSION }}-linux-amd64.zip
          mkdir -p src-tauri/binaries
          cp rclone-v${{ env.RCLONE_VERSION }}-linux-amd64/rclone src-tauri/binaries/rclone-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/rclone-x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Standard Tauri App
        run: pnpm tauri build

      - name: Copy sidecar to release folder
        run: |
          mkdir -p src-tauri/target/release
          cp src-tauri/binaries/rclone-x86_64-unknown-linux-gnu src-tauri/target/release/rclone-x86_64-unknown-linux-gnu

      - name: Install flatpak-cargo-generator requirements
        run: |
          python3 -m pip install tomlkit aiohttp

      - name: Clone flatpak-builder-tools
        run: |
          git clone --depth 1 https://github.com/flatpak/flatpak-builder-tools.git

      - name: Generate cargo-sources.json
        run: |
          python3 flatpak-builder-tools/cargo/flatpak-cargo-generator.py src-tauri/Cargo.lock -o .github/flatpak/cargo-sources.json

      - name: Upload cargo-sources.json as artifact
        uses: actions/upload-artifact@v7
        with:
          name: cargo-sources
          path: .github/flatpak/cargo-sources.json
          if-no-files-found: error

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-linux
          path: |
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
            src-tauri/target/release/scs-rclient
            src-tauri/target/release/rclone-x86_64-unknown-linux-gnu
            dist/
          if-no-files-found: error

  build-windows:
    name: Build Windows Application
    needs: verify-rclone
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check for package changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'package.json'
              - 'pnpm-lock.yaml'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download verified rclone binaries
        uses: actions/download-artifact@v7
        with:
          name: verified-rclone
          path: verified-binaries

      - name: Extract Windows Sidecar
        shell: pwsh
        run: |
          Expand-Archive -Path verified-binaries/rclone-v${{ env.RCLONE_VERSION }}-windows-amd64.zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item -Path rclone-v${{ env.RCLONE_VERSION }}-windows-amd64/rclone.exe -Destination src-tauri/binaries/rclone-x86_64-pc-windows-msvc.exe

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Standard Tauri App
        run: pnpm tauri build

      - name: Rename Standard Windows Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/target/release/bundle/nsis
          Copy-Item -Path src-tauri/target/release/scs-rclient.exe -Destination src-tauri/target/release/bundle/nsis/scs-rclient-win-10-portable.exe
          $msiFile = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if ($msiFile) {
            Rename-Item -Path $msiFile.FullName -NewName "scs-rclient-win-10.msi"
          }

      - name: Build Tauri App with Embedded WebView2
        run: |
          node -e "const fs = require('fs'); const file = 'src-tauri/tauri.conf.json'; const config = JSON.parse(fs.readFileSync(file, 'utf8')); config.bundle.windows = config.bundle.windows || {}; config.bundle.windows.webviewInstallMode = { type: 'offlineInstaller' }; fs.writeFileSync(file, JSON.stringify(config, null, 2), 'utf8');"
          pnpm tauri build

      - name: Rename Embedded WebView2 Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/target/release/bundle/nsis
          Copy-Item -Path src-tauri/target/release/scs-rclient.exe -Destination src-tauri/target/release/bundle/nsis/scs-rclient-win-7-portable.exe
          $msiFile = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Where-Object { $_.Name -notlike "*win-10*" } | Select-Object -First 1
          if ($msiFile) {
            Rename-Item -Path $msiFile.FullName -NewName "scs-rclient-win-7.msi"
          }

      - name: Create Portable Windows Zip
        shell: pwsh
        run: |
          cd src-tauri/target/release/bundle/nsis
          Compress-Archive -Path "scs-rclient-win-10-portable.exe", "scs-rclient-win-7-portable.exe" -DestinationPath "portable-windows.zip"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-windows
          path: |
            src-tauri/target/release/bundle/nsis/scs-rclient-win-10-portable.exe
            src-tauri/target/release/bundle/nsis/scs-rclient-win-7-portable.exe
            src-tauri/target/release/bundle/nsis/portable-windows.zip
            src-tauri/target/release/bundle/msi/scs-rclient-win-10.msi
            src-tauri/target/release/bundle/msi/scs-rclient-win-7.msi
          if-no-files-found: error

      - name: Upload Portable Windows Zip Artifact
        uses: actions/upload-artifact@v7
        with:
          name: portable-windows-zip
          path: |
            src-tauri/target/release/bundle/nsis/scs-rclient-win-10-portable.exe
            src-tauri/target/release/bundle/nsis/scs-rclient-win-7-portable.exe
          if-no-files-found: error

      - name: Verify Win10 Portable Binary Presence
        if: steps.filter.outputs.packages == 'true'
        shell: pwsh
        run: |
          $filePath = "src-tauri/target/release/bundle/nsis/scs-rclient-win-10-portable.exe"
          if (Test-Path $filePath) {
            $size = (Get-Item $filePath).Length
            Write-Host "SUCCESS: $filePath exists ($size bytes) and is accessible."
          } else {
            Write-Error "ERROR: $filePath is missing! It may have been cleaned up by subsequent build steps."
            exit 1
          }

      - name: Scan Win10 Portable Binary via VirusTotal
        if: steps.filter.outputs.packages == 'true'
        uses: crazy-max/ghaction-virustotal@v5.0.0
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_KEY }}
          files: |
            src-tauri/target/release/bundle/nsis/scs-rclient-win-10-portable.exe
          request_rate: 2

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download Linux build artifact
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-linux
          path: .

      - name: Download cargo-sources.json
        uses: actions/download-artifact@v7
        with:
          name: cargo-sources
          path: .github/flatpak

      - name: Make binary executable
        run: |
          chmod +x src-tauri/target/release/scs-rclient
          chmod +x src-tauri/target/release/rclone-x86_64-unknown-linux-gnu

      - name: Build Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: scs-rclient.flatpak
          manifest-path: .github/flatpak/online.anthonyis.scs-rclient.yml
          cache-key: flatpak-builder-${{ github.sha }}
          run-tests: false

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-flatpak
          path: scs-rclient.flatpak
          if-no-files-found: error

  build-macos:
    name: Build macOS Application
    needs: verify-rclone
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download verified rclone binaries
        uses: actions/download-artifact@v7
        with:
          name: verified-rclone
          path: verified-binaries

      - name: Extract macOS Sidecar
        run: |
          unzip verified-binaries/rclone-v${{ env.RCLONE_VERSION }}-osx-arm64.zip
          mkdir -p src-tauri/binaries
          cp rclone-v${{ env.RCLONE_VERSION }}-osx-arm64/rclone src-tauri/binaries/rclone-aarch64-apple-darwin
          chmod +x src-tauri/binaries/rclone-aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Standard Tauri App
        run: pnpm tauri build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-macos
          path: |
            src-tauri/target/release/bundle/dmg/
          if-no-files-found: error

  test-linux:
    name: Test Linux Application
    needs: [verify-rclone, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        run: |
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get update
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 webkit2gtk-driver xvfb

      - name: Download Linux build artifact
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-linux
          path: .

      - name: Make binaries executable
        run: |
          chmod +x src-tauri/target/release/scs-rclient
          chmod +x src-tauri/target/release/rclone-x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Testing Dependencies
        run: pnpm -C test install

      - name: Run Vitest API Mocks
        run: pnpm test

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Run WebdriverIO E2E Tests
        run: xvfb-run pnpm test:e2e

  test-windows:
    name: Test Windows Application
    needs: [verify-rclone, build-windows]
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download Windows build artifact
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-windows
          path: .

      - name: Reconstruct Release Binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/target/release
          Copy-Item -Path nsis/scs-rclient-win-10-portable.exe -Destination src-tauri/target/release/scs-rclient.exe

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Testing Dependencies
        run: pnpm -C test install

      - name: Run Vitest API Mocks
        run: pnpm test

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install msedgedriver
        shell: pwsh
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Run WebdriverIO E2E Tests
        shell: pwsh
        run: pnpm test:e2e

  test-macos:
    name: Test macOS Application
    needs: [verify-rclone, build-macos]
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Testing Dependencies
        run: pnpm -C test install

      - name: Run Vitest API Mocks
        run: pnpm test

  publish-release:
    name: Publish Release Assets
    if: github.event_name == 'release'
    needs: [build-linux, build-windows, flatpak, build-macos, test-linux, test-windows, test-macos]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-linux
          path: linux-assets

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-windows
          path: windows-assets

      - name: Download Flatpak Artifact
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-flatpak
          path: flatpak-asset

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-macos
          path: macos-assets

      - name: Upload Assets to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find linux-assets windows-assets flatpak-asset macos-assets -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.flatpak" -o -name "*.dmg" -o -name "*.zip" \) -exec gh release upload ${{ github.event.release.tag_name }} --clobber {} \+

      - name: Append Checksums to Release Description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retrieve the current release body
          gh release view ${{ github.event.release.tag_name }} --json body --jq .body > release_body.txt
          
          # Strip any existing checksum table to prevent duplicates on workflow re-runs
          sed -i '/### SHA256 Checksums/,$d' release_body.txt
          
          # Append the header
          echo -e "\n\n### SHA256 Checksums" >> release_body.txt
          echo "| File | SHA256 Hash |" >> release_body.txt
          echo "| --- | --- |" >> release_body.txt
          
          # Compute hashes and write markdown rows
          find linux-assets windows-assets flatpak-asset macos-assets -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.flatpak" -o -name "*.dmg" -o -name "*.zip" \) | while read -r file; do
            filename=$(basename "$file")
            hash=$(sha256sum "$file" | awk '{print $1}')
            echo "| \`$filename\` | \`$hash\` |" >> release_body.txt
          done
          
          # Update the release notes
          gh release edit ${{ github.event.release.tag_name }} --notes-file release_body.txt

  virustotal:
    name: VirusTotal Release Asset Scan
    if: github.event_name == 'release'
    needs: [publish-release]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Scan Release Assets via VirusTotal
        uses: crazy-max/ghaction-virustotal@v5.0.0
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_KEY }}
          update_release_body: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            scs-rclient-win-10-portable\.exe$
          request_rate: 2
