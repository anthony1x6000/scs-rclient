version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "glib"
        reason: "glib 0.20.0+ requires gtk-rs 0.20+ which is constrained by Tauri v2 GUI dependencies (gtk 0.18)"

