version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "glib"
        reason: "GHSA-wrw7-89jp-8q8g / RUSTSEC-2024-0429: glib 0.20+ requires GTK4 / gtk-rs 0.20+ constrained by Tauri v2 (see tauri-apps/tauri#12048, fix in v3 #12563)"


